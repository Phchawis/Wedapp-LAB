name: Keep Render Awake

# ปิงเว็บบน Render เป็นระยะ เพื่อไม่ให้บริการ "หลับ" (spin down)
# Render ฟรีจะหลับหลังไม่มีคนเข้า 15 นาที — ปิงทุก 10 นาทีจึงทำให้ตื่นตลอด
on:
  schedule:
    - cron: '*/10 * * * *'   # ทุก 10 นาที (เวลา UTC)
  workflow_dispatch:          # กดรันเองได้จากแท็บ Actions เพื่อทดสอบ

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site
        run: |
          echo "Pinging at $(date -u) UTC"
          curl -fsS --max-time 90 --retry 3 --retry-delay 15 \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            https://tuh-lab-qms.onrender.com/
